services:
  bunri:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./uploads:/app/uploads
      - ./projects:/app/projects
      - ./soundfonts:/app/soundfonts
    environment:
      - OLLAMA_URL=http://ollama:11434
    restart: unless-stopped

  # Ollama (optional): docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
