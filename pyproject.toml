[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line-too-long（既存コードに多い）
    "F401",   # unused-import（遅延インポートパターン）
    "E402",   # module-import-not-at-top-of-file（遅延インポート）
    "F841",   # local-variable-is-assigned-but-never-used
    "W291",   # trailing-whitespace
    "W292",   # no-newline-at-end-of-file
    "W293",   # whitespace-before-punctuation
]

[tool.ruff.lint.per-file-ignores]
"test/**" = ["F811"]  # redefined-while-unused (pytest fixtures)
